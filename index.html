<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>災害意思決定シミュレーター：能登半島地震の経験から考える避難・健康・共助</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-root">

    <div id="home-screen" class="screen active">
        <div class="home-overlay"></div>

        <div class="home-content">
            <div style="font-size: 20px;"class="home-title">
                防災シミュレーター<br>能登半島地震の経験から考える避難・健康・共助
            </div>

            <p class="home-description">
                このゲームは災害医療の教育を目的とする試作版です。実際の災害時には自治体・気象庁・消防・医療機関などの情報に従う必要があります。<br>
               被災経験を想起してつらくなった場合は無理せずプレイを中断してください。 <br>
                <span style="font-size:0.8rem;">※音が出ますので十分ご注意ください</span>
            </p>

            <button class="start-btn home-start-btn" onclick="Game.toSelect()">開始する</button>

            <div class="home-credit">
                開発：平尾勇磨<br>
                指導：南保英孝<br>
                医学監修：唐島成宙
            </div>
        </div>
    </div>
 </div>
    <div id="select-screen" class="screen">
        <div class="nav-header">
            <button class="back-btn" onclick="Game.toHome()"></button>
            <span class="nav-title">シナリオ選択</span>
            <div style="width:24px;"></div>
        </div>
        <div class="stage-list" id="stage-list">
            </div>
    </div>
    <!-- ▼追加：ブリーフィング（状況説明）画面 -->
    <div id="briefing-screen" class="screen">
        <div class="nav-header">
            <button class="back-btn" onclick="Game.toSelect()">←</button>
            <span class="nav-title">状況説明</span>
            <div style="width:24px;"></div>
        </div>
        <div class="briefing-content" id="briefing-content">
            <!-- JSからテキストが挿入されます -->
        </div>
        <div style="padding: 20px; text-align: center;">
            <button class="start-btn" onclick="Game.startSceneAfterBriefing()">ミッション開始</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <header>
            <div class="game-info">
                <span class="phase-badge" id="phase-badge">---</span>
                <span class="time-display" id="time-display">--:--</span>
            </div>
            
            <div class="status-container">
                <div class="status-item">
                    <div class="status-label"><span>HEALTH</span><span id="val-hp">100</span></div>
                    <div class="gauge-bg"><div id="gauge-hp" class="gauge-fill" style="background:#d32f2f;"></div></div>
                </div>
                <div class="status-item">
                    <div class="status-label"><span>HYGIENE</span><span id="val-sanit">100</span></div>
                    <div class="gauge-bg"><div id="gauge-sanit" class="gauge-fill" style="background:#1565c0;"></div></div>
                </div>
                <div class="status-item">
                    <div class="status-label"><span>TRUST</span><span id="val-trust">50</span></div>
                    <div class="gauge-bg"><div id="gauge-trust" class="gauge-fill" style="background:#2e7d32;"></div></div>
                </div>
            </div>
        </header>

        <div id="visual-stage">
            <img id="scene-img" src="" alt="Scene">
            <div id="overlay-alert" class="overlay-alert"></div>
            <div id="toast"></div>
        </div>

        <div id="control-panel">
            <div class="speaker-tag" id="speaker">SYSTEM</div>
            <div id="dialogue-text">...</div>
            <div id="options-list"></div>
        </div>
    </div>
    -- ▼追加：制限時間タイマーUI -->
            <div id="timer-container" style="display:none; margin-bottom: 15px;">
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:bold; color:var(--accent);">
                    <span>制限時間</span>
                    <span id="timer-text">15秒</span>
                </div>
                <div style="background:#e0e0e0; height:6px; border-radius:3px; overflow:hidden; margin-top:4px;">
                    <div id="timer-bar" style="background:var(--warning); height:100%; width:100%; transition:width 1s linear;"></div>
                </div>
            </div>

    <div id="result-screen" class="screen">
        <div class="nav-header">
            <span class="nav-title">結果・フィードバック</span>
        </div>
        <div id="result-content">
            <div class="score-box">
                <div style="font-size:0.8rem; color:#999;">SCORE</div>
                <div class="score-num" id="final-score">0</div>
                <div id="rank-text" style="font-weight:bold; color:#2c3e50;"></div>
            </div>
            <div id="feedback-list"></div>
            <button class="start-btn" style="width:100%; margin-top:20px;" onclick="Game.toSelect()">シナリオ選択へ</button>
        </div>
    </div>

</div>

<script src="js/audio.js"></script>
<script src="js/scenarios.js"></script>
<script src="js/game.js"></script>

</body>
</html>
